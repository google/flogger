name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Cancel in-progress runs for pull requests, but not for master branch pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: "JDK ${{ matrix.java }}"
    strategy:
      matrix:
        java: [8, 11, 22]
    runs-on: ubuntu-latest
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'Cache Bazel dependencies'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/bazel/*/*/external
          key: bazel-${{ hashFiles('MODULE.bazel') }}
          restore-keys: |
            bazel-
      - name: 'Set up JDK ${{ matrix.java }}'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      - name: 'Test'
        shell: bash
        run: bazelisk test --lockfile_mode=error --test_output=errors //...
      - name: 'Test Deploy Script'
        if: matrix.java == 22
        shell: bash
        run: release/install-local-snapshot.sh
